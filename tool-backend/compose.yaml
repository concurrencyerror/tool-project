services:
  tool-db:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MARIADB_DATABASE: ${DB_NAME:-tools}
      MARIADB_USER: ${DB_USERNAME:-tool_user}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - tool-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  tool-redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - tool-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  tool-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: tool-backend:latest
    restart: unless-stopped
    depends_on:
      tool-db:
        condition: service_healthy
      tool-redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SPRING_PROFILES_ACTIVE: pro
      DB_URL: jdbc:mariadb://tool-db:3306/${DB_NAME:-tools}
      DB_USERNAME: ${DB_USERNAME:-tool_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: tool-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "${APP_PORT:-6677}:6677"

volumes:
  tool-db-data:
  tool-redis-data:
