spring:
  datasource:
    url: jdbc:postgresql://tool-pgdb:5432/tool
    username: tool
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: tool-redis
      port: 6379
      password: ${REDIS_PASSWORD}
logging:
  config: classpath:log/log-back.xml
